<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestia 25 | Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); padding: 25px; margin-bottom: 20px; }
        .nav-pills .nav-link.active { background-color: #6366f1; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        #reader { border-radius: 12px; overflow: hidden; border: none !important; }
        #reader__scan_region { background: white; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Celestia 25 Admin</h2>
        <button class="btn btn-dark rounded-pill px-4" onclick="fetchData()" id="refreshBtn">Sync Data</button>
    </div>

    <div class="glass-card">
        <h6 class="text-uppercase text-muted fw-bold small mb-2">Registration Progress</h6>
        <div class="progress mb-2" style="height: 12px; border-radius: 10px;">
            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-indigo" style="width: 0%; background-color: #6366f1;"></div>
        </div>
        <div class="d-flex justify-content-between small fw-bold">
            <span id="countText">0 / 300</span>
            <span id="percentText">0%</span>
        </div>
    </div>

    <ul class="nav nav-pills nav-fill mb-4 p-1 bg-white rounded-pill shadow-sm" id="adminTab">
        <li class="nav-item"><button class="nav-link active rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-all">Participants</button></li>
        <li class="nav-item"><button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-scan">📸 Scan QR</button></li>
        <li class="nav-item"><button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-beverage">Beverages</button></li>
        <li class="nav-item"><button class="nav-link rounded-pill" data-bs-toggle="tab" data-bs-target="#tab-pageant">Pageant</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-all">
            <div class="glass-card p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="table-all">
                        <thead class="table-light"><tr><th>Name</th><th>Status</th><th>Payment</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-scan">
            <div class="glass-card text-center">
                <h5 class="mb-3">Check-In Scanner</h5>
                <div id="reader" class="mx-auto" style="max-width: 400px;"></div>
                <div id="scan-result" class="mt-4 p-3 rounded-3 fw-bold"></div>
                <button class="btn btn-primary mt-3 px-5 rounded-pill" onclick="startScanner()" id="startBtn">Open Camera</button>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-beverage">
            <div class="row">
                <div class="col-md-6"><h6>🍷 Alcoholic</h6><div id="list-alcoholic" class="list-group mb-3"></div></div>
                <div class="col-md-6"><h6>🥤 Non-Alcoholic</h6><div id="list-non-alcoholic" class="list-group"></div></div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-pageant">
             <div class="row">
                <div class="col-md-4"><h6>👔 Mr. Celestia</h6><div id="list-mr" class="list-group mb-3"></div></div>
                <div class="col-md-4"><h6>👗 Mrs. Celestia</h6><div id="list-mrs" class="list-group mb-3"></div></div>
                <div class="col-md-4"><h6>✖ None</h6><div id="list-none" class="list-group"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🛑 PASTE YOUR NEW WEB APP URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbxWrAjNCmr8NieSRsmO3HuuX25MgFhA_8QUAHp4azICzpVk8jnToDc16hvfYObymfUg6Q/exec";

    let html5QrCode;

    async function fetchData() {
        const btn = document.getElementById('refreshBtn');
        btn.disabled = true;
        try {
            const response = await fetch(`${API_URL}?v=${new Date().getTime()}`);
            const data = await response.json();
            renderData(data);
        } catch (err) { alert("Sync failed."); }
        finally { btn.disabled = false; }
    }

    function renderData(data) {
        // Progress Logic
        const count = data.length;
        const percent = Math.min((count/300)*100, 100).toFixed(1);
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('countText').innerText = `${count} / 300 Participants`;
        document.getElementById('percentText').innerText = percent + '%';

        // Clear and Redraw
        document.querySelector('#table-all tbody').innerHTML = '';
        ['list-alcoholic', 'list-non-alcoholic', 'list-mr', 'list-mrs', 'list-none'].forEach(id => document.getElementById(id).innerHTML = '');

        data.forEach(p => {
            const status = p['Status'] || 'Pending';
            const badgeClass = status.includes('Checked') ? 'bg-success' : 'bg-warning text-dark';
            const slip = p['Proof'] ? `<a href="${p['Proof']}" target="_blank" class="btn btn-sm btn-outline-primary py-0">View</a>` : 'N/A';

            document.querySelector('#table-all tbody').innerHTML += `
                <tr>
                    <td><strong>${p['Full Name']}</strong><br><small class="text-muted">${p['Email']}</small></td>
                    <td><span class="status-badge ${badgeClass}">${status}</span></td>
                    <td>${slip}</td>
                </tr>`;
            
            // Re-use logic for categorization... (Shortened for brevity)
            const itemHtml = `<div class="list-group-item d-flex justify-content-between align-items-center">${p['Full Name']} ${slip}</div>`;
            const bev = (p['Alcoholic Or Not'] || "").toLowerCase();
            if(bev.includes('non')) document.getElementById('list-non-alcoholic').innerHTML += itemHtml;
            else if(bev.includes('alcoholic')) document.getElementById('list-alcoholic').innerHTML += itemHtml;
        });
    }

    async function startScanner() {
        document.getElementById('startBtn').style.display = 'none';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
    }

    async function onScanSuccess(decodedText) {
        html5QrCode.pause();
        const resDiv = document.getElementById('scan-result');
        resDiv.className = "mt-4 p-3 rounded-3 bg-light text-primary";
        resDiv.innerText = "Checking UUID: " + decodedText;

        try {
            const response = await fetch(`${API_URL}?action=checkin&uuid=${encodeURIComponent(decodedText)}`);
            const res = await response.json();

            if (res.success) {
                resDiv.className = "mt-4 p-3 rounded-3 bg-success text-white";
                resDiv.innerText = `✅ Checked In: ${res.name}`;
                fetchData(); // Refresh the list in the background
            } else {
                resDiv.className = "mt-4 p-3 rounded-3 bg-danger text-white";
                resDiv.innerText = `❌ Error: ${res.message}`;
            }
        } catch (e) { resDiv.innerText = "Connection Error"; }

        setTimeout(() => { html5QrCode.resume(); resDiv.innerText = "Scanning..."; }, 3000);
    }

    fetchData();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestia Admin Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #6366f1; --bg-color: #f9fafb; }
        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; padding-top: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-tabs .nav-link { color: #4b5563; font-weight: 500; }
        .nav-tabs .nav-link.active { color: var(--primary-color); border-bottom: 3px solid var(--primary-color); }
        .progress { height: 25px; border-radius: 50px; background-color: #e5e7eb; }
        .btn-preview { background-color: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; font-size: 0.85rem; }
        .btn-preview:hover { background-color: #dbeafe; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Celestia Event Admin</h2>
        <button class="btn btn-primary shadow-sm" onclick="fetchData()" id="refreshBtn">Refresh Live Data</button>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <h6 class="text-uppercase text-muted fw-bold mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Registration Progress</h6>
            <div class="progress mb-2">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-primary" role="progressbar" style="width: 0%"></div>
            </div>
            <div class="d-flex justify-content-between small fw-medium">
                <span id="countText">0 / 300 Participants</span>
                <span id="percentText">0%</span>
            </div>
        </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="adminTab" role="tablist">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-all">All Participants</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-beverage">Beverage Preferences</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-pageant">Pageant Participation</button></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tab-all">
            <div class="card p-3"><div class="table-responsive"><table class="table align-middle" id="table-all">
                <thead class="table-light"><tr><th>Name</th><th>Email</th><th>Details</th><th>Payment</th></tr></thead>
                <tbody></tbody>
            </table></div></div>
        </div>

        <div class="tab-pane fade" id="tab-beverage">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3 text-danger">🍷 Alcoholic</h5>
                    <div id="list-alcoholic" class="list-group"></div>
                </div>
                <div class="col-md-6">
                    <h5 class="mb-3 text-success">🥤 Non-Alcoholic</h5>
                    <div id="list-non-alcoholic" class="list-group"></div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-pageant">
            <div class="row">
                <div class="col-md-4"><h6>👔 Mr. Celestia</h6><div id="list-mr" class="list-group mb-4"></div></div>
                <div class="col-md-4"><h6>👗 Mrs. Celestia</h6><div id="list-mrs" class="list-group mb-4"></div></div>
                <div class="col-md-4 text-muted"><h6>✖ Not Participating</h6><div id="list-none" class="list-group"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🛑 REPLACE THIS URL WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "YOUR_WEB_APP_URL_HERE";

    async function fetchData() {
        const btn = document.getElementById('refreshBtn');
        btn.disabled = true;
        btn.innerText = "Syncing...";

        try {
            const response = await fetch(https://script.google.com/macros/s/AKfycbyDP78bFEOWincYOfr3AyM9aldvxWjAP4JXFFfy0ZV1akaBCWJIwzlLgcNfiM5A54Ikhg/exec);
            const data = await response.json();
            renderData(data);
        } catch (err) {
            alert("Error fetching data. Check your Web App URL and Permissions.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Refresh Live Data";
        }
    }

    function renderData(data) {
        // 1. Update Progress
        const count = data.length;
        const target = 300;
        const percent = Math.min((count / target) * 100, 100).toFixed(1);
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('countText').innerText = `${count} / ${target} Participants`;
        document.getElementById('percentText').innerText = percent + '%';

        // 2. Reset Containers
        const tables = ['table-all', 'list-alcoholic', 'list-non-alcoholic', 'list-mr', 'list-mrs', 'list-none'];
        tables.forEach(id => {
            const el = document.getElementById(id);
            if(el.tagName === 'TABLE') el.querySelector('tbody').innerHTML = '';
            else el.innerHTML = '';
        });

        // 3. Populate
        data.forEach(p => {
            const name = p['Full Name'] || 'N/A';
            const email = p['Email'] || 'N/A';
            const bev = (p['Alcoholic Or Not'] || '').toLowerCase();
            const pageant = (p['Participate on'] || '').toLowerCase();
            const slip = p['Proof'] ? `<a href="${p['Proof']}" target="_blank" class="btn btn-preview">Preview Slip</a>` : '<span class="text-muted small">No Slip</span>';

            // All Table
            document.querySelector('#table-all tbody').innerHTML += `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td class="text-muted small">${email}</td>
                    <td><span class="badge bg-light text-dark border">${p['Participate on']}</span></td>
                    <td>${slip}</td>
                </tr>`;

            // Beverage Categorization
            const bevItem = `<div class="list-group-item d-flex justify-content-between align-items-center"><div>${name}<br><small class="text-muted">${email}</small></div>${slip}</div>`;
            if (bev.includes('non')) document.getElementById('list-non-alcoholic').innerHTML += bevItem;
            else if (bev.includes('alcoholic')) document.getElementById('list-alcoholic').innerHTML += bevItem;

            // Pageant Categorization
            const pagItem = `<div class="list-group-item p-2 small"><strong>${name}</strong><br>${slip}</div>`;
            if (pageant.includes('mr.')) document.getElementById('list-mr').innerHTML += pagItem;
            else if (pageant.includes('mrs') || pageant.includes('miss')) document.getElementById('list-mrs').innerHTML += pagItem;
            else document.getElementById('list-none').innerHTML += pagItem;
        });
    }

    // Initial Load
    fetchData();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
